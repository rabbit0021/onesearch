version: "3.9"
services:
  app:
    build: .
    expose:
      - "8000"          # only reachable inside Docker network, not from outside
    env_file:
      - .env
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    pids_limit: 100
    mem_limit: 512m
    cpus: "0.5"
    volumes:
      - ./logs:/app/logs
      - ./tmp:/app/tmp
      - ./data:/app/data
      - ./static:/app/static
    networks:
      - appnet
    container_name: onesearch_app
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: onesearch_nginx
    ports:
      - "80:80"       # HTTP (redirects to HTTPS)
      - "443:443"     # HTTPS
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot-certs:/etc/letsencrypt
      - certbot-www:/var/www/certbot
    depends_on:
      - app
    networks:
      - appnet
    restart: unless-stopped

  certbot:
    image: certbot/certbot
    container_name: onesearch_certbot
    volumes:
      - certbot-certs:/etc/letsencrypt
      - certbot-www:/var/www/certbot

volumes:
  certbot-certs:   # stores SSL certificates, persisted across restarts
  certbot-www:     # used by certbot for domain verification challenge files

networks:
  appnet: