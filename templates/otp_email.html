<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your onesearch verification code</title>
</head>
<body style="margin:0;padding:0;background-color:#f0f0ee;font-family:'Segoe UI',Arial,sans-serif;">

  <table width="100%" cellpadding="0" cellspacing="0" border="0" style="background-color:#f0f0ee;padding:32px 0;">
    <tr>
      <td align="center">
        <table width="100%" cellpadding="0" cellspacing="0" border="0" style="max-width:480px;">

          <!-- Header -->
          <tr>
            <td style="background:#ffffff;border-radius:12px 12px 0 0;padding:24px 28px 20px;border-left:1px solid #e0e0de;border-right:1px solid #e0e0de;border-top:1px solid #e0e0de;">
              <a href="https://onesearch.blog" target="_blank" rel="noopener noreferrer" style="text-decoration:none;">
                <img src="https://onesearch.blog/static/logo.png" alt="onesearch" width="48" height="48" style="display:block;border-radius:6px;">
              </a>
            </td>
          </tr>

          <!-- Body -->
          <tr>
            <td style="background:#ffffff;padding:8px 28px 32px;border-left:1px solid #e0e0de;border-right:1px solid #e0e0de;">

              <table width="100%" cellpadding="0" cellspacing="0" border="0" style="margin-bottom:24px;">
                <tr>
                  <td style="border-left:4px solid #d97757;padding-left:14px;">
                    <p style="margin:0;font-size:11px;font-weight:600;color:#d97757;text-transform:uppercase;letter-spacing:0.08em;">Verification Code</p>
                    <h1 style="margin:4px 0 0;font-size:20px;font-weight:700;color:#111111;line-height:1.3;">Confirm your email to like posts</h1>
                  </td>
                </tr>
              </table>

              <p style="margin:0 0 20px;font-size:14px;color:#555552;line-height:1.6;">
                Use the code below to verify your email address. It expires in <strong>10 minutes</strong>.
              </p>

              <!-- OTP Box -->
              <table width="100%" cellpadding="0" cellspacing="0" border="0" style="margin-bottom:24px;">
                <tr>
                  <td align="center" style="background:#f7f7f5;border:1px solid #e0e0de;border-radius:8px;padding:24px;">
                    <p style="margin:0;font-size:36px;font-weight:700;letter-spacing:0.3em;color:#d97757;font-family:'Courier New',monospace;">{{ otp }}</p>
                  </td>
                </tr>
              </table>

              <p style="margin:0;font-size:12px;color:#999996;line-height:1.6;">
                If you did not request this code, you can safely ignore this email.<br>
                Do not share this code with anyone.
              </p>

            </td>
          </tr>

          <!-- Footer -->
          <tr>
            <td style="background:#f7f7f5;border:1px solid #e0e0de;border-top:none;border-radius:0 0 12px 12px;padding:16px 28px;">
              <p style="margin:0;font-size:12px;color:#888884;">
                <a href="https://onesearch.blog" target="_blank" rel="noopener noreferrer" style="color:#d97757;text-decoration:none;font-weight:600;">onesearch.blog</a>
                &nbsp;·&nbsp; One place for all engineering blogs
              </p>
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>

</body>
</html>
