name: CI/CD to Hetzner

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true
          tags: onesearch:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run tests
        run: docker run --rm --entrypoint pytest -e MODEL_PATH=data/trained_classifier.pkl -e DB_TYPE=sqlite -e DB_PATH=data/tests.db onesearch:test -s -m "not real"

  deploy:
    needs: build-and-test
    if: github.ref == 'refs/heads/main'   # only deploy on main, not PRs
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Hetzner
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 443   # SSH runs on 443 to work through corporate firewalls
          envs: FLASK_ENV,DB_TYPE,DB_PATH,MODEL_PATH,POSTS_SECRET_KEY,SMTP_USERNAME,SMTP_PASSWORD,SECRET_KEY,JIRA_CLIENT_ID,JIRA_CLIENT_SECRET,JIRA_REDIRECT_URI,FRONTEND_URL
          script: |
            cd /app
            git pull origin main

            # Write .env from GitHub Secrets â€” no manual .env management on server
            cat > .env << EOF
            FLASK_ENV=$FLASK_ENV
            DB_TYPE=$DB_TYPE
            DB_PATH=$DB_PATH
            MODEL_PATH=$MODEL_PATH
            POSTS_SECRET_KEY=$POSTS_SECRET_KEY
            SMTP_USERNAME=$SMTP_USERNAME
            SMTP_PASSWORD=$SMTP_PASSWORD
            SECRET_KEY=$SECRET_KEY
            JIRA_CLIENT_ID=$JIRA_CLIENT_ID
            JIRA_CLIENT_SECRET=$JIRA_CLIENT_SECRET
            JIRA_REDIRECT_URI=$JIRA_REDIRECT_URI
            FRONTEND_URL=$FRONTEND_URL
            EOF

            docker compose up -d --build
        env:
          FLASK_ENV: ${{ vars.FLASK_ENV }}
          DB_TYPE: ${{ vars.DB_TYPE }}
          DB_PATH: ${{ vars.DB_PATH }}
          MODEL_PATH: ${{ vars.MODEL_PATH }}
          POSTS_SECRET_KEY: ${{ secrets.POSTS_SECRET_KEY }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          JIRA_CLIENT_ID: ${{ secrets.JIRA_CLIENT_ID }}
          JIRA_CLIENT_SECRET: ${{ secrets.JIRA_CLIENT_SECRET }}
          JIRA_REDIRECT_URI: ${{ vars.JIRA_REDIRECT_URI }}
          FRONTEND_URL: ${{ vars.FRONTEND_URL }}
